##############################################################################
#
# This is a script for Klipper that allows for Wyze Cam V3 cameras running the 
# Thingino (https://github.com/themactep/thingino-firmware) camera firmware to
# control the Wyze Cam V3 Spotlight accessory
#
##############################################################################

# ---------------------------------------------------------------------------
# Shell command definitions — CAM1 (<cam1_ip>)
# ---------------------------------------------------------------------------

[gcode_shell_command cam1_spotlight_high_cmd]
command: ssh -i /home/<hostname>/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@<cam1_ip> 'spotlight_ctl high'
timeout: 5.
verbose: False

[gcode_shell_command cam1_spotlight_low_cmd]
command: ssh -i /home/<hostname>/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@<cam1_ip> 'spotlight_ctl low'
timeout: 5.
verbose: False

[gcode_shell_command cam1_spotlight_off_cmd]
command: ssh -i /home/<hostname>/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@<cam1_ip> 'spotlight_ctl off'
timeout: 5.
verbose: False

# ---------------------------------------------------------------------------
# Shell command definitions — CAM2 (<cam2_ip>)
# ---------------------------------------------------------------------------

[gcode_shell_command cam2_spotlight_high_cmd]
command: ssh -i /home/<hostname>/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@<cam2_ip> 'spotlight_ctl high'
timeout: 5.
verbose: False

[gcode_shell_command cam2_spotlight_low_cmd]
command: ssh -i /home/<hostname>/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@<cam2_ip> 'spotlight_ctl low'
timeout: 5.
verbose: False

[gcode_shell_command cam2_spotlight_off_cmd]
command: ssh -i /home/<hostname>/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@<cam2_ip> 'spotlight_ctl off'
timeout: 5.
verbose: False

# ---------------------------------------------------------------------------
# Per-camera macros — CAM1
# ---------------------------------------------------------------------------

[gcode_macro CAM1_SPOTLIGHT_HIGH]
description: CAM1 spotlight full brightness
gcode:
    RESPOND MSG="CAM1 Spotlight: HIGH"
    RUN_SHELL_COMMAND CMD=cam1_spotlight_high_cmd

[gcode_macro CAM1_SPOTLIGHT_LOW]
description: CAM1 spotlight low brightness
gcode:
    RESPOND MSG="CAM1 Spotlight: LOW"
    RUN_SHELL_COMMAND CMD=cam1_spotlight_low_cmd

[gcode_macro CAM1_SPOTLIGHT_OFF]
description: CAM1 spotlight off
gcode:
    RESPOND MSG="CAM1 Spotlight: OFF"
    RUN_SHELL_COMMAND CMD=cam1_spotlight_off_cmd

# ---------------------------------------------------------------------------
# Per-camera macros — CAM2
# ---------------------------------------------------------------------------

[gcode_macro CAM2_SPOTLIGHT_HIGH]
description: CAM2 spotlight full brightness
gcode:
    RESPOND MSG="CAM2 Spotlight: HIGH"
    RUN_SHELL_COMMAND CMD=cam2_spotlight_high_cmd

[gcode_macro CAM2_SPOTLIGHT_LOW]
description: CAM2 spotlight low brightness
gcode:
    RESPOND MSG="CAM2 Spotlight: LOW"
    RUN_SHELL_COMMAND CMD=cam2_spotlight_low_cmd

[gcode_macro CAM2_SPOTLIGHT_OFF]
description: CAM2 spotlight off
gcode:
    RESPOND MSG="CAM2 Spotlight: OFF"
    RUN_SHELL_COMMAND CMD=cam2_spotlight_off_cmd

# ---------------------------------------------------------------------------
# Combined macros — all cameras
# ---------------------------------------------------------------------------

[gcode_macro SPOTLIGHT_HIGH]
description: All spotlights full brightness
gcode:
    CAM1_SPOTLIGHT_HIGH
    CAM2_SPOTLIGHT_HIGH

[gcode_macro SPOTLIGHT_LOW]
description: All spotlights low brightness
gcode:
    CAM1_SPOTLIGHT_LOW
    CAM2_SPOTLIGHT_LOW

[gcode_macro SPOTLIGHT_OFF]
description: All spotlights off
gcode:
    CAM1_SPOTLIGHT_OFF
    CAM2_SPOTLIGHT_OFF
